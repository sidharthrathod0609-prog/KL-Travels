# Recommended Nginx Configuration for KL Travels Production Deployment
# Place this inside /etc/nginx/sites-available/kl-travels and symlink to sites-enabled

server {
    listen 80;
    listen [::]:80;
    server_name kltravels.in www.kltravels.in; # Replace with your actual domain

    # Automatic HTTP to HTTPS redirection
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kltravels.in www.kltravels.in; # Replace with your actual domain

    # SSL Configuration (Paths to your Let's Encrypt certificates)
    ssl_certificate /etc/letsencrypt/live/kltravels.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kltravels.in/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Static Assets Root Directory (Vite build output 'dist' folder)
    root /var/www/kl-travels/dist;
    index index.html;

    # Enable Gzip Compression for optimal load speed
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";

    # Strict Production Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Secure Content Security Policy (CSP)
    add_header Content-Security-Policy "upgrade-insecure-requests; default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://lovable.dev https://*.supabase.co; connect-src 'self' https://*.supabase.co https://www.googletagmanager.com https://challenges.cloudflare.com; frame-src 'self' https://www.googletagmanager.com https://challenges.cloudflare.com;" always;

    location / {
        # Single Page Application (SPA) routing fallback
        try_files $uri $uri/ /index.html;
    }

    # Cache Control for static assets (cache-busting is handled by Vite bundle filenames)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Disable access logs for robots.txt and favicon
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
